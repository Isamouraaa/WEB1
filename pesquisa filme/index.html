<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineBusca</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="py-5 text-center container">
        <div class="row py-lg-3">
            <div class="col-lg-6 col-md-8 mx-auto">
                <h1 class="fw-bold text-primary display-4">CineBusca</h1>
                
                <div class="input-group mb-3 shadow">
                    <input type="text" id="search-input" class="form-control form-control-lg" placeholder="Digite o nome da série ou filme..." aria-label="Nome da série">
                    <button class="btn btn-primary btn-lg" type="button" id="search-button">Buscar</button>
                </div>
            </div>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4" id="results-grid">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <script src="script/script.js"></script>
</body>
</html>
